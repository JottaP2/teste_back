services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-rocketfogueteelonmusk2023}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@rocketjr.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-foguetinhos2023}
    volumes:
      - site-rocketjr-data:/app/data
    # A SEÇÃO 'PORTS' FOI REMOVIDA DAQUI

volumes:
  site-rocketjr-data:
    driver: local